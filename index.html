<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 VideoDownloader Pro | HD</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --secondary: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 5px; }
        p { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }

        .input-box {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 14px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
        }

        #timer-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 14px;
            display: none;
        }

        .countdown {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
        }

        .btn-final {
            display: none;
            margin-top: 20px;
            padding: 18px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p>TikTok • YouTube • Instagram</p>

    <input type="url" id="urlInput" class="input-box" placeholder="Pega el link aquí..." required>
    
    <button id="mainBtn" class="btn-main" onclick="startProcess()">GENERAR DESCARGA</button>

    <div id="timer-box">
        <span id="status-text">Analizando enlace...</span>
        <span class="countdown" id="seconds">10</span>
    </div>

    <a id="download-link" href="#" class="btn-final">📥 CLIC PARA DESCARGAR</a>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const MONETAG_LINK = "TU_DIRECT_LINK_AQUI"; 

    function startProcess() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return alert("Pega un link válido");

        // 1. ABRIR MONETAG
        window.open(MONETAG_LINK, '_blank');

        // 2. UI
        document.getElementById('mainBtn').style.display = "none";
        document.getElementById('timer-box').style.display = "block";

        let timeLeft = 10;
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                generateSafeLink(url);
            }
        }, 1000);
    }

    function generateSafeLink(videoUrl) {
        document.getElementById('timer-box').style.display = "none";
        const dl = document.getElementById('download-link');
        
        // Usamos un servicio de redirección de descarga directa (SSYoutube / SaveFrom)
        // Esto es mucho más estable para navegadores móviles
        let cleanUrl = videoUrl.replace("https://", "");
        let finalPath = "https://ssyoutube.com/en/" + cleanUrl;

        // Si es TikTok, usamos un procesador alternativo
        if(videoUrl.includes("tiktok")){
            finalPath = "https://snaptik.app/abc?url=" + encodeURIComponent(videoUrl);
        }

        dl.href = finalPath;
        dl.style.display = "block";
        
        // Alerta opcional para guiar al usuario
        alert("¡Enlace generado! Serás redirigido al servidor de descarga.");
    }
</script>

</body>
</html>
