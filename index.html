<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 VideoDownloader Pro | HD</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --secondary: #94a3b8;
            --success: #10b981;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--accent); letter-spacing: -1px; }
        p { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }

        .input-box {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 14px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-main:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        #timer-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.1);
            display: none;
            border: 1px dashed var(--accent);
        }

        .countdown {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
            margin-top: 10px;
        }

        #download-link {
            display: none;
            margin-top: 20px;
            padding: 18px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .footer-info { margin-top: 25px; font-size: 0.75rem; color: #4b5563; }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p>YT • TikTok • Instagram • FB</p>

    <input type="url" id="urlInput" class="input-box" placeholder="Pega el enlace aquí..." required>
    
    <button id="mainBtn" class="btn-main" onclick="startProcess()">GENERAR DESCARGA</button>

    <div id="timer-box">
        <span id="status-text" style="font-weight: 600;">Verificando enlace seguro...</span>
        <span class="countdown" id="seconds">10</span>
    </div>

    <a id="download-link" href="#" target="_blank">📥 ¡DESCARGAR AHORA!</a>
    
    <div class="footer-info">
        Al procesar el video, aceptas nuestros términos.<br>
        <b>Servicio Gratuito y Seguro.</b>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE MONETIZACIÓN ---
    const MONETAG_LINK = "TU_DIRECT_LINK_AQUI"; // REEMPLAZA ESTO
    const WAIT_TIME = 10; 

    function startProcess() {
        const urlInput = document.getElementById('urlInput');
        const videoUrl = urlInput.value.trim();

        if (!videoUrl) {
            alert("Por favor, pega un enlace válido.");
            return;
        }

        // 1. ABRIR MONETAG (Direct Link)
        window.open(MONETAG_LINK, '_blank');

        // 2. UI - Bloquear entrada y mostrar contador
        const btn = document.getElementById('mainBtn');
        const timerBox = document.getElementById('timer-box');
        const secondsEl = document.getElementById('seconds');
        
        btn.disabled = true;
        urlInput.disabled = true;
        timerBox.style.display = "block";

        let timeLeft = WAIT_TIME;

        // 3. CUENTA REGRESIVA
        const timer = setInterval(async () => {
            timeLeft--;
            secondsEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                await fetchVideo(videoUrl);
            }
        }, 1000);
    }

    async function fetchVideo(videoUrl) {
        const statusText = document.getElementById('status-text');
        const secondsEl = document.getElementById('seconds');
        const downloadLink = document.getElementById('download-link');

        statusText.textContent = "Sincronizando con el servidor...";
        secondsEl.style.display = "none";

        try {
            // API Robustecida
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Accept": "application/json" 
                },
                body: JSON.stringify({ 
                    url: videoUrl,
                    videoQuality: "720",
                    filenameStyle: "basic"
                })
            });
            
            const data = await response.json();

            // Verificamos múltiples formas de respuesta de la API
            if (data.url || (data.picker && data.picker.length > 0)) {
                const finalUrl = data.url || data.picker[0].url;
                document.getElementById('timer-box').style.display = "none";
                downloadLink.href = finalUrl;
                downloadLink.style.display = "block";
                statusText.textContent = "¡Enlace generado!";
            } else {
                throw new Error("No link");
            }
        } catch (e) {
            alert("El servidor está saturado. Por favor, intenta de nuevo o prueba con otro video.");
            location.reload(); // Recarga para limpiar errores
        }
    }
</script>

</body>
</html>
