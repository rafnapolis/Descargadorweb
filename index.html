<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 Descargador Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 2rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); font-size: 1.5rem; }
        input { width: 100%; padding: 15px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #timer-box { display: none; margin-top: 20px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 10px; }
        .countdown { font-size: 2rem; font-weight: bold; color: var(--accent); }
        .btn-final { display: none; margin-top: 20px; padding: 15px; background: #10b981; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p>YouTube • TikTok • Instagram</p>
    <input type="url" id="urlInput" placeholder="Pega el link aquí...">
    <button id="mainBtn" onclick="startProcess()">GENERAR DESCARGA</button>

    <div id="timer-box">
        <span id="msg">Preparando enlace...</span>
        <div class="countdown" id="seconds">10</div>
    </div>

    <a id="downloadLink" href="#" target="_blank" class="btn-final" style="display: none;">📥 CLIC PARA DESCARGAR</a>
</div>

<script>
    // COLOCA TU LINK DE MONETAG AQUÍ
    const MONETAG = "https://omg10.com/4/9616671"; 

    function startProcess() {
        const rawUrl = document.getElementById('urlInput').value.trim();
        if (!rawUrl) return alert("Pega un link");

        // 1. ABRIR MONETAG
        window.open(MONETAG, '_blank');

        // 2. UI
        document.getElementById('mainBtn').style.display = "none";
        document.getElementById('timer-box').style.display = "block";

        let timeLeft = 10;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                finish(rawUrl);
            }
        }, 1000);
    }

    function finish(url) {
        document.getElementById('timer-box').style.display = "none";
        const linkBtn = document.getElementById('downloadLink');
        
        // Esta es la forma más compatible de crear el link de descarga
        const finalUrl = "https://savefrom.net/?url=" + encodeURIComponent(url);
        
        linkBtn.href = finalUrl;
        linkBtn.style.display = "block";
        
        alert("¡Listo! Haz clic en el botón verde para ir a la descarga.");
    }
</script>

</body>
</html>
