<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 VideoDownloader Pro | Sin Marca de Agua</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --secondary: #94a3b8; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 5px; }
        .subtitle { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }
        
        input { width: 100%; padding: 16px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--accent); }
        
        button { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #0f172a; font-size: 1rem; transition: 0.3s; }
        button:active { transform: scale(0.98); }

        .steps { margin-top: 30px; text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .step { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.85rem; color: var(--secondary); }
        .step-num { background: var(--accent); color: #0f172a; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; flex-shrink: 0; }

        #timer-box { display: none; margin-top: 20px; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 15px; border: 1px dashed var(--accent); }
        .countdown { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        
        .btn-final { display: none; margin-top: 20px; padding: 18px; background: #10b981; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; animation: pulse 1.5s infinite; text-align: center; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p class="subtitle">TikTok Sin Marca de Agua • YT • IG</p>
    
    <input type="url" id="urlInput" placeholder="Pega el link aquí...">
    <button id="mainBtn" onclick="startProcess()">GENERAR DESCARGA</button>

    <div id="timer-box">
        <span id="msg">Eliminando marca de agua...</span>
        <div class="countdown" id="seconds">10</div>
    </div>

    <a id="downloadLink" href="#" target="_blank" class="btn-final" style="display: none;">📥 CLIC PARA DESCARGAR</a>

    <div class="steps" id="stepsBlock">
        <div class="step"><div class="step-num">1</div> Pega el enlace del video arriba.</div>
        <div class="step"><div class="step-num">2</div> Espera 10 segundos de escaneo.</div>
        <div class="step"><div class="step-num">3</div> Descarga tu video en HD y sin logos.</div>
    </div>
</div>

<script>
    // TU ENLACE DE MONETAG YA INTEGRADO
    const MONETAG = "https://omg10.com/4/9616671"; 

    function startProcess() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return alert("Por favor, pega un enlace");

        // ABRIR PUBLICIDAD
        window.open(MONETAG, '_blank');

        document.getElementById('mainBtn').style.display = "none";
        document.getElementById('stepsBlock').style.display = "none";
        document.getElementById('timer-box').style.display = "block";

        let timeLeft = 10;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                finish(url);
            }
        }, 1000);
    }

    function finish(url) {
        document.getElementById('timer-box').style.display = "none";
        const linkBtn = document.getElementById('downloadLink');
        
        // Redirección a SaveFrom para máxima compatibilidad
        linkBtn.href = "https://savefrom.net/?url=" + encodeURIComponent(url);
        linkBtn.style.display = "block";
        
        alert("¡Proceso completado! Haz clic en el botón verde.");
    }
</script>

</body>
</html>
