<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 VideoDownloader Pro | HD</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --secondary: #94a3b8; --kofi: #29abe0; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 5px; }
        .subtitle { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }
        
        input { width: 100%; padding: 16px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; }
        
        button { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #0f172a; font-size: 1rem; }

        #timer-box { display: none; margin-top: 20px; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 15px; border: 1px dashed var(--accent); }
        .countdown { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        
        #download-area { display: none; margin-top: 20px; }
        .btn-download { display: block; width: 100%; padding: 18px; background: #10b981; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; animation: pulse 1.5s infinite; }
        
        .kofi-btn { margin-top: 25px; display: inline-flex; align-items: center; background: var(--kofi); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; }
        .kofi-btn img { width: 20px; margin-right: 8px; }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.03);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p class="subtitle">Descarga HD Sin Marca de Agua</p>
    
    <input type="url" id="urlInput" placeholder="Pega el link aquí...">
    <button id="mainBtn" onclick="startProcess()">GENERAR VIDEO</button>

    <div id="timer-box">
        <span id="status">Limpiando marca de agua...</span>
        <div class="countdown" id="seconds">5</div>
    </div>

    <div id="download-area">
        <a id="finalLink" href="#" class="btn-download" download>📥 DESCARGAR AHORA</a>
        <p style="font-size: 0.7rem; color: var(--secondary); margin-top: 10px;">El video se guardará en tu galería.</p>
    </div>

    <a href="https://ko-fi.com/TU_USUARIO" target="_blank" class="kofi-btn">
        <img src="https://storage.ko-fi.com/cdn/cup-border.png" alt="Ko-fi">
        ¿Te sirvió? Invítame un café
    </a>
</div>

<script>
    async function startProcess() {
        const videoUrl = document.getElementById('urlInput').value.trim();
        if (!videoUrl) return alert("Pega un link válido");

        document.getElementById('mainBtn').style.display = "none";
        document.getElementById('timer-box').style.display = "block";

        let timeLeft = 5;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;
            if (timeLeft <= 0) clearInterval(interval);
        }, 1000);

        try {
            // Usamos un túnel de API que devuelve el archivo directamente
            const response = await fetch(`https://api.cobalt.tools/api/json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ url: videoUrl, videoQuality: "720" })
            });
            const data = await response.json();

            if (data.url) {
                setTimeout(() => {
                    document.getElementById('timer-box').style.display = "none";
                    document.getElementById('download-area').style.display = "block";
                    document.getElementById('finalLink').href = data.url;
                }, 5000);
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("Error al procesar. Verifica el link o intenta más tarde.");
            location.reload();
        }
    }
</script>

</body>
</html>
