<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 VideoDownloader Pro | Sin Marca de Agua</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --secondary: #94a3b8; --kofi: #29abe0; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .card { background: var(--card); width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        h1 { color: var(--accent); font-size: 1.6rem; margin-bottom: 5px; }
        .subtitle { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }
        
        input { width: 100%; padding: 16px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; width: 100%; }
        
        button { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #0f172a; font-size: 1rem; }

        #timer-box { display: none; margin-top: 20px; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 15px; border: 1px dashed var(--accent); }
        .countdown { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        
        .btn-final { display: none; margin-top: 20px; padding: 18px; background: #10b981; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; }
        
        .kofi-btn { margin-top: 25px; display: inline-flex; align-items: center; background: var(--kofi); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; }
        .kofi-btn img { width: 20px; margin-right: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p class="subtitle">TikTok Sin Marca de Agua • HD</p>
    
    <input type="url" id="urlInput" placeholder="Pega el link de TikTok aquí...">
    <button id="mainBtn" onclick="startProcess()">QUITAR MARCA DE AGUA</button>

    <div id="timer-box">
        <span id="status">Limpiando video...</span>
        <div class="countdown" id="seconds">5</div>
    </div>

    <a id="downloadLink" href="#" target="_blank" class="btn-final">📥 OBTENER VIDEO LIMPIO</a>

    <br>
    <a href="https://ko-fi.com/TU_USUARIO" target="_blank" class="kofi-btn">
        <img src="https://storage.ko-fi.com/cdn/cup-border.png" alt="Ko-fi">
        Invítame un café
    </a>
</div>

<script>
    function startProcess() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return alert("Pega un link de TikTok");

        // UI
        document.getElementById('mainBtn').style.display = "none";
        document.getElementById('timer-box').style.display = "block";

        let timeLeft = 5;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                
                // MÉTODO EFECTIVO: Redirección al motor de SnapTik
                // Esto procesa el video y quita la marca de agua garantizado.
                const finalUrl = "https://snaptik.app/abc?url=" + encodeURIComponent(url);
                
                document.getElementById('timer-box').style.display = "none";
                const btn = document.getElementById('downloadLink');
                btn.href = finalUrl;
                btn.style.display = "block";
                
                alert("¡Video procesado! Haz clic en el botón para descargar.");
            }
        }, 1000);
    }
</script>

</body>
</html>
