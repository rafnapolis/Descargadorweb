<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📥 Descargador de Videos Pro | HD</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --secondary: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; color: var(--accent); }
        p { color: var(--secondary); font-size: 0.9rem; margin-bottom: 25px; }

        .input-box {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus { border-color: var(--accent); }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-main:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        #timer-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(56, 189, 248, 0.1);
            display: none;
        }

        .countdown {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        #download-link {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>VideoDownloader</h1>
    <p>Premium & Free Service</p>

    <input type="url" id="urlInput" class="input-box" placeholder="Pega el link aquí..." required>
    
    <button id="mainBtn" class="btn-main" onclick="startProcess()">GENERAR DESCARGA</button>

    <div id="timer-box">
        <span id="status-text">Generando enlace seguro...</span>
        <span class="countdown" id="seconds">10</span>
    </div>

    <a id="download-link" href="#" target="_blank">📥 ¡DESCARGAR AHORA!</a>
    
    <p style="margin-top: 20px; font-size: 0.7rem; color: #4b5563;">Al hacer clic, aceptas nuestros términos de uso.</p>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const MONETAG_LINK = "https://omg10.com/4/10278885"; // REEMPLAZA ESTO
    const WAIT_TIME = 10; // Segundos de espera

    function startProcess() {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert("Pega un link primero");

        // 1. ABRIR PUBLICIDAD
        window.open(MONETAG_LINK, '_blank');

        // 2. UI - Desactivar botón y mostrar contador
        const btn = document.getElementById('mainBtn');
        const timerBox = document.getElementById('timer-box');
        const secondsEl = document.getElementById('seconds');
        
        btn.disabled = true;
        timerBox.style.display = "block";

        let timeLeft = WAIT_TIME;

        // 3. CUENTA REGRESIVA
        const timer = setInterval(async () => {
            timeLeft--;
            secondsEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                await fetchVideo(url);
            }
        }, 1000);
    }

    async function fetchVideo(videoUrl) {
        const statusText = document.getElementById('status-text');
        const secondsEl = document.getElementById('seconds');
        const downloadLink = document.getElementById('download-link');

        statusText.textContent = "Obteniendo archivo...";
        secondsEl.style.display = "none";

        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({ url: videoUrl })
            });
            const data = await response.json();

            if (data.url) {
                document.getElementById('timer-box').style.display = "none";
                downloadLink.href = data.url;
                downloadLink.style.display = "block";
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("Error al procesar. Reintenta con otro link.");
            location.reload();
        }
    }
</script>

</body>
  </html>
